<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>業務ログ</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #2563eb;
  --primary-dark: #1d4ed8;
  --danger: #dc2626;
  --danger-dark: #b91c1c;
  --success: #16a34a;
  --success-dark: #15803d;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-300: #d1d5db;
  --gray-400: #9ca3af;
  --gray-500: #6b7280;
  --gray-600: #4b5563;
  --gray-700: #374151;
  --gray-800: #1f2937;
  --gray-900: #111827;
  --radius: 10px;
  --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 6px rgba(0,0,0,.1), 0 2px 4px rgba(0,0,0,.06);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  background: var(--gray-100);
  color: var(--gray-800);
  line-height: 1.6;
  min-height: 100dvh;
}

.app {
  max-width: 540px;
  margin: 0 auto;
  padding: 12px;
  padding-bottom: 80px;
}

/* Tabs */
.tabs {
  display: flex;
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  margin-bottom: 16px;
}
.tab-btn {
  flex: 1;
  padding: 14px 8px;
  border: none;
  background: #fff;
  font-size: 15px;
  font-weight: 600;
  color: var(--gray-500);
  cursor: pointer;
  transition: all .2s;
  position: relative;
}
.tab-btn.active {
  color: var(--primary);
  background: #eff6ff;
}
.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: var(--primary);
}

/* Cards */
.card {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px;
  margin-bottom: 16px;
}
.card-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--gray-500);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 12px;
}

/* Selection buttons (radio-style) */
.select-group {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.select-btn {
  flex: 1 1 auto;
  min-width: calc(50% - 4px);
  padding: 12px 10px;
  border: 2px solid var(--gray-200);
  border-radius: 8px;
  background: #fff;
  font-size: 15px;
  font-weight: 500;
  color: var(--gray-700);
  cursor: pointer;
  transition: all .15s;
  text-align: center;
  -webkit-tap-highlight-color: transparent;
}
.select-btn:active { transform: scale(.97); }
.select-btn.selected {
  border-color: var(--primary);
  background: #eff6ff;
  color: var(--primary);
  font-weight: 700;
}
.select-btn-wide {
  min-width: 100%;
}

/* Timer */
.timer-display {
  text-align: center;
  font-size: 48px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--gray-800);
  padding: 16px 0 20px;
  letter-spacing: 2px;
}
.timer-display.running { color: var(--danger); }
.timer-controls {
  display: flex;
  gap: 12px;
  justify-content: center;
}
.timer-btn {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: none;
  font-size: 28px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s;
  box-shadow: var(--shadow-md);
  -webkit-tap-highlight-color: transparent;
}
.timer-btn:active { transform: scale(.93); }
.btn-start {
  background: var(--success);
  color: #fff;
}
.btn-start:hover { background: var(--success-dark); }
.btn-stop {
  background: var(--danger);
  color: #fff;
}
.btn-stop:hover { background: var(--danger-dark); }
.btn-stop:disabled, .btn-start:disabled {
  background: var(--gray-300);
  color: var(--gray-400);
  cursor: not-allowed;
  box-shadow: none;
}

/* Status badge */
.status-bar {
  text-align: center;
  margin-top: 12px;
  font-size: 13px;
  color: var(--gray-500);
  min-height: 20px;
}
.status-bar .badge {
  display: inline-block;
  background: #fef2f2;
  color: var(--danger);
  padding: 2px 10px;
  border-radius: 999px;
  font-weight: 600;
  font-size: 12px;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: .6; }
}

/* Inputs */
.input-field {
  width: 100%;
  padding: 12px 14px;
  border: 2px solid var(--gray-200);
  border-radius: 8px;
  font-size: 15px;
  font-family: inherit;
  color: var(--gray-800);
  transition: border-color .15s;
  resize: vertical;
}
.input-field:focus {
  outline: none;
  border-color: var(--primary);
}
.input-field::placeholder { color: var(--gray-400); }

/* Action buttons */
.action-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all .15s;
  -webkit-tap-highlight-color: transparent;
}
.action-btn:active { transform: scale(.98); }
.btn-primary {
  background: var(--primary);
  color: #fff;
}
.btn-primary:hover { background: var(--primary-dark); }
.btn-danger-outline {
  background: #fff;
  color: var(--danger);
  border: 2px solid #fecaca;
}
.btn-danger-outline:hover { background: #fef2f2; }

/* Log list */
.log-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  gap: 8px;
}
.log-nav {
  display: flex;
  align-items: center;
  gap: 6px;
}
.nav-btn {
  width: 36px;
  height: 36px;
  border: 2px solid var(--gray-200);
  border-radius: 8px;
  background: #fff;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
.nav-btn:active { background: var(--gray-100); }
.date-label {
  font-size: 14px;
  font-weight: 600;
  color: var(--gray-700);
  min-width: 100px;
  text-align: center;
}
.view-toggle {
  display: flex;
  border: 2px solid var(--gray-200);
  border-radius: 8px;
  overflow: hidden;
}
.view-btn {
  padding: 6px 12px;
  border: none;
  background: #fff;
  font-size: 13px;
  font-weight: 600;
  color: var(--gray-500);
  cursor: pointer;
}
.view-btn.active {
  background: var(--primary);
  color: #fff;
}

.log-item {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 14px 16px;
  margin-bottom: 10px;
}
.log-item-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 6px;
}
.log-category {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.log-tag {
  font-size: 12px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 4px;
}
.tag-major {
  background: #dbeafe;
  color: #1e40af;
}
.tag-minor {
  background: #f3e8ff;
  color: #6b21a8;
}
.tag-classroom {
  background: #dcfce7;
  color: #166534;
}
.tag-shift {
  background: #fef9c3;
  color: #854d0e;
}
.log-delete {
  background: none;
  border: none;
  color: var(--gray-400);
  font-size: 18px;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
  line-height: 1;
}
.log-delete:hover { color: var(--danger); background: #fef2f2; }
.log-time {
  font-size: 14px;
  color: var(--gray-600);
  margin-bottom: 4px;
}
.log-duration {
  font-size: 13px;
  font-weight: 700;
  color: var(--primary);
}
.log-memo {
  font-size: 13px;
  color: var(--gray-500);
  margin-top: 4px;
  word-break: break-all;
}
.log-url {
  font-size: 12px;
  margin-top: 4px;
}
.log-url a {
  color: var(--primary);
  word-break: break-all;
}
.log-empty {
  text-align: center;
  padding: 32px 16px;
  color: var(--gray-400);
  font-size: 14px;
}
.log-summary {
  background: #eff6ff;
  border-radius: var(--radius);
  padding: 12px 16px;
  margin-bottom: 12px;
  font-size: 14px;
  color: var(--gray-700);
  display: flex;
  justify-content: space-between;
}
.log-summary strong { color: var(--primary); }

/* Hidden */
.hidden { display: none !important; }

/* Confirm dialog */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 20px;
}
.dialog {
  background: #fff;
  border-radius: var(--radius);
  padding: 24px;
  max-width: 340px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,.2);
}
.dialog-title {
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 8px;
}
.dialog-msg {
  font-size: 14px;
  color: var(--gray-600);
  margin-bottom: 20px;
}
.dialog-actions {
  display: flex;
  gap: 10px;
}
.dialog-actions button {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  border: none;
}
.dialog-cancel {
  background: var(--gray-100);
  color: var(--gray-700);
}
.dialog-confirm {
  background: var(--danger);
  color: #fff;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--gray-800);
  color: #fff;
  padding: 12px 24px;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 600;
  z-index: 200;
  transition: transform .3s ease;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

@media (max-width: 400px) {
  .timer-display { font-size: 40px; }
  .select-btn { padding: 10px 8px; font-size: 14px; }
}
</style>
</head>
<body>

<div class="app">
  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="record" onclick="switchTab('record')">記録</button>
    <button class="tab-btn" data-tab="logs" onclick="switchTab('logs')">ログ一覧</button>
  </div>

  <!-- Record Tab -->
  <div id="tab-record">
    <!-- Classroom -->
    <div class="card">
      <div class="card-title">教室</div>
      <div class="select-group" id="classroom-group">
        <button class="select-btn" data-value="練馬" onclick="selectOption('classroom', this)">練馬</button>
        <button class="select-btn" data-value="ひばり" onclick="selectOption('classroom', this)">ひばり</button>
      </div>
    </div>

    <!-- Shift -->
    <div class="card">
      <div class="card-title">出勤形態</div>
      <div class="select-group" id="shift-group">
        <button class="select-btn" data-value="早出" onclick="selectOption('shift', this)">早出</button>
        <button class="select-btn" data-value="遅出" onclick="selectOption('shift', this)">遅出</button>
      </div>
    </div>

    <!-- Major Category -->
    <div class="card">
      <div class="card-title">大カテゴリ</div>
      <div class="select-group" id="major-group">
        <button class="select-btn" data-value="コミュニケーション" onclick="selectMajor(this)">コミュニケーション</button>
        <button class="select-btn" data-value="教務" onclick="selectMajor(this)">教務</button>
        <button class="select-btn" data-value="生徒管理" onclick="selectMajor(this)">生徒管理</button>
        <button class="select-btn" data-value="教室運営" onclick="selectMajor(this)">教室運営</button>
        <button class="select-btn" data-value="制作・その他" onclick="selectMajor(this)">制作・その他</button>
      </div>
    </div>

    <!-- Minor Category -->
    <div class="card hidden" id="minor-card">
      <div class="card-title">中カテゴリ</div>
      <div class="select-group" id="minor-group"></div>
    </div>

    <!-- Timer -->
    <div class="card">
      <div class="card-title">タイマー</div>
      <div class="timer-display" id="timer-display">00:00:00</div>
      <div class="timer-controls">
        <button class="timer-btn btn-start" id="btn-start" onclick="startTimer()" title="開始">▶</button>
        <button class="timer-btn btn-stop" id="btn-stop" onclick="stopTimer()" disabled title="停止">■</button>
      </div>
      <div class="status-bar" id="status-bar"></div>
    </div>

    <!-- Memo -->
    <div class="card">
      <div class="card-title">メモ（任意）</div>
      <textarea class="input-field" id="memo" rows="2" placeholder="自由記述…"></textarea>
    </div>

    <!-- Artifact URL (only for 教務) -->
    <div class="card hidden" id="url-card">
      <div class="card-title">成果物URL</div>
      <input class="input-field" id="artifact-url" type="url" placeholder="GoogleドライブのURLを貼り付け">
    </div>

    <!-- Save -->
    <button class="action-btn btn-primary" id="btn-save" onclick="saveLog()">保存する</button>
  </div>

  <!-- Logs Tab -->
  <div id="tab-logs" class="hidden">
    <div class="card" style="padding: 14px 16px;">
      <div class="log-header">
        <div class="log-nav">
          <button class="nav-btn" onclick="navigateDate(-1)">◀</button>
          <span class="date-label" id="date-label"></span>
          <button class="nav-btn" onclick="navigateDate(1)">▶</button>
        </div>
        <div class="view-toggle">
          <button class="view-btn active" data-view="day" onclick="setView('day')">日別</button>
          <button class="view-btn" data-view="week" onclick="setView('week')">週別</button>
        </div>
      </div>
    </div>

    <div id="log-summary" class="log-summary hidden">
      <span>件数: <strong id="summary-count">0</strong></span>
      <span>合計: <strong id="summary-time">0:00</strong></span>
    </div>

    <div id="log-list"></div>

    <button class="action-btn btn-primary" style="margin-top: 8px;" onclick="exportCSV()">📥 CSVダウンロード</button>
  </div>
</div>

<!-- Confirm Dialog -->
<div class="overlay hidden" id="confirm-overlay">
  <div class="dialog">
    <div class="dialog-title">削除の確認</div>
    <div class="dialog-msg">このログを削除しますか？この操作は元に戻せません。</div>
    <div class="dialog-actions">
      <button class="dialog-cancel" onclick="closeConfirm()">キャンセル</button>
      <button class="dialog-confirm" id="confirm-delete-btn">削除</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── Category definitions ──
const CATEGORIES = {
  'コミュニケーション': ['保護者面談', '外部面談', 'GC返信', '外部メール', '体験用メール', 'たっちメール'],
  '教務': ['解説作成', '動画管理', '学習計画表', 'テスト関連', '教材準備'],
  '生徒管理': ['個別管理', '名簿管理', '入退塾処理', '生徒面談'],
  '教室運営': ['消耗品管理', '郵送', '印刷', '月謝管理', '環境整備'],
  '制作・その他': ['各種案内作成', 'フォーム作成', '講習パンフ', 'ツール作成', 'その他']
};

// ── State ──
const state = {
  classroom: null,
  shift: null,
  major: null,
  minor: null,
  timerRunning: false,
  startTime: null,
  elapsed: 0,
  timerInterval: null,
  viewMode: 'day',
  viewDate: new Date()
};

// ── Storage ──
function loadLogs() {
  try { return JSON.parse(localStorage.getItem('work_logs') || '[]'); }
  catch { return []; }
}
function saveLogs(logs) {
  localStorage.setItem('work_logs', JSON.stringify(logs));
}

// ── Tab switching ──
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.getElementById('tab-record').classList.toggle('hidden', tab !== 'record');
  document.getElementById('tab-logs').classList.toggle('hidden', tab !== 'logs');
  if (tab === 'logs') renderLogs();
}

// ── Selection helpers ──
function selectOption(field, btn) {
  const group = btn.parentElement;
  group.querySelectorAll('.select-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  state[field] = btn.dataset.value;
}

function selectMajor(btn) {
  selectOption('major', btn);
  state.minor = null;
  const minorCard = document.getElementById('minor-card');
  const minorGroup = document.getElementById('minor-group');
  const urlCard = document.getElementById('url-card');

  const subs = CATEGORIES[state.major];
  if (subs) {
    minorGroup.innerHTML = subs.map(s =>
      `<button class="select-btn" data-value="${s}" onclick="selectOption('minor', this)">${s}</button>`
    ).join('');
    minorCard.classList.remove('hidden');
  } else {
    minorCard.classList.add('hidden');
  }

  urlCard.classList.toggle('hidden', state.major !== '教務');
}

// ── Timer ──
function startTimer() {
  if (!state.classroom) { showToast('教室を選択してください'); return; }
  if (!state.shift) { showToast('出勤形態を選択してください'); return; }
  if (!state.major) { showToast('大カテゴリを選択してください'); return; }
  if (!state.minor) { showToast('中カテゴリを選択してください'); return; }

  state.timerRunning = true;
  state.startTime = new Date();
  state.elapsed = 0;
  document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-stop').disabled = false;
  document.getElementById('timer-display').classList.add('running');
  document.getElementById('status-bar').innerHTML = '<span class="badge">計測中</span>';

  state.timerInterval = setInterval(() => {
    state.elapsed = Math.floor((Date.now() - state.startTime.getTime()) / 1000);
    document.getElementById('timer-display').textContent = formatSeconds(state.elapsed);
  }, 200);
}

function stopTimer() {
  if (!state.timerRunning) return;
  clearInterval(state.timerInterval);
  state.timerRunning = false;
  state.elapsed = Math.floor((Date.now() - state.startTime.getTime()) / 1000);
  document.getElementById('timer-display').textContent = formatSeconds(state.elapsed);
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-stop').disabled = true;
  document.getElementById('timer-display').classList.remove('running');
  document.getElementById('status-bar').innerHTML = '';
}

function formatSeconds(s) {
  const h = String(Math.floor(s / 3600)).padStart(2, '0');
  const m = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
  const sec = String(s % 60).padStart(2, '0');
  return `${h}:${m}:${sec}`;
}

function formatMinutes(totalSec) {
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  return h > 0 ? `${h}時間${m}分` : `${m}分`;
}

// ── Save log ──
function saveLog() {
  if (state.timerRunning) { showToast('タイマーを停止してから保存してください'); return; }
  if (!state.startTime || state.elapsed === 0) { showToast('タイマーで計測してから保存してください'); return; }

  const endTime = new Date(state.startTime.getTime() + state.elapsed * 1000);
  const memo = document.getElementById('memo').value.trim();
  const url = state.major === '教務' ? document.getElementById('artifact-url').value.trim() : '';

  const log = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    date: state.startTime.toISOString().slice(0, 10),
    classroom: state.classroom,
    shift: state.shift,
    major: state.major,
    minor: state.minor,
    startTime: state.startTime.toISOString(),
    endTime: endTime.toISOString(),
    duration: state.elapsed,
    memo: memo,
    artifactUrl: url
  };

  const logs = loadLogs();
  logs.push(log);
  saveLogs(logs);

  // Reset
  state.startTime = null;
  state.elapsed = 0;
  document.getElementById('timer-display').textContent = '00:00:00';
  document.getElementById('memo').value = '';
  document.getElementById('artifact-url').value = '';

  showToast('保存しました');
}

// ── Log display ──
function setView(mode) {
  state.viewMode = mode;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === mode));
  renderLogs();
}

function navigateDate(dir) {
  if (state.viewMode === 'day') {
    state.viewDate.setDate(state.viewDate.getDate() + dir);
  } else {
    state.viewDate.setDate(state.viewDate.getDate() + dir * 7);
  }
  renderLogs();
}

function getWeekRange(date) {
  const d = new Date(date);
  const day = d.getDay();
  const mon = new Date(d);
  mon.setDate(d.getDate() - ((day + 6) % 7));
  const sun = new Date(mon);
  sun.setDate(mon.getDate() + 6);
  return { start: mon, end: sun };
}

function fmtDate(d) {
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

function fmtDateShort(d) {
  const days = ['日','月','火','水','木','金','土'];
  return `${d.getMonth()+1}/${d.getDate()}(${days[d.getDay()]})`;
}

function renderLogs() {
  const logs = loadLogs();
  const label = document.getElementById('date-label');
  const list = document.getElementById('log-list');
  const summaryEl = document.getElementById('log-summary');

  let filtered;
  if (state.viewMode === 'day') {
    const dateStr = state.viewDate.toISOString().slice(0, 10);
    label.textContent = fmtDateShort(state.viewDate);
    filtered = logs.filter(l => l.date === dateStr);
  } else {
    const range = getWeekRange(state.viewDate);
    const startStr = range.start.toISOString().slice(0, 10);
    const endStr = range.end.toISOString().slice(0, 10);
    label.textContent = `${fmtDateShort(range.start)} 〜 ${fmtDateShort(range.end)}`;
    filtered = logs.filter(l => l.date >= startStr && l.date <= endStr);
  }

  filtered.sort((a, b) => new Date(b.startTime) - new Date(a.startTime));

  if (filtered.length > 0) {
    const totalSec = filtered.reduce((s, l) => s + l.duration, 0);
    document.getElementById('summary-count').textContent = filtered.length;
    document.getElementById('summary-time').textContent = formatMinutes(totalSec);
    summaryEl.classList.remove('hidden');
  } else {
    summaryEl.classList.add('hidden');
  }

  if (filtered.length === 0) {
    list.innerHTML = '<div class="log-empty">この期間のログはありません</div>';
    return;
  }

  list.innerHTML = filtered.map(l => {
    const start = new Date(l.startTime);
    const end = new Date(l.endTime);
    const timeStr = `${fmtDate(start)} ${String(start.getHours()).padStart(2,'0')}:${String(start.getMinutes()).padStart(2,'0')} 〜 ${String(end.getHours()).padStart(2,'0')}:${String(end.getMinutes()).padStart(2,'0')}`;
    const urlHtml = l.artifactUrl ? `<div class="log-url"><a href="${escapeHtml(l.artifactUrl)}" target="_blank" rel="noopener">${escapeHtml(l.artifactUrl)}</a></div>` : '';
    const memoHtml = l.memo ? `<div class="log-memo">💬 ${escapeHtml(l.memo)}</div>` : '';
    return `
      <div class="log-item">
        <div class="log-item-header">
          <div class="log-category">
            <span class="log-tag tag-classroom">${escapeHtml(l.classroom)}</span>
            <span class="log-tag tag-shift">${escapeHtml(l.shift)}</span>
            <span class="log-tag tag-major">${escapeHtml(l.major)}</span>
            <span class="log-tag tag-minor">${escapeHtml(l.minor)}</span>
          </div>
          <button class="log-delete" onclick="confirmDelete('${l.id}')" title="削除">✕</button>
        </div>
        <div class="log-time">${timeStr}</div>
        <div class="log-duration">${formatMinutes(l.duration)}</div>
        ${memoHtml}
        ${urlHtml}
      </div>`;
  }).join('');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ── Delete ──
let pendingDeleteId = null;
function confirmDelete(id) {
  pendingDeleteId = id;
  document.getElementById('confirm-overlay').classList.remove('hidden');
  document.getElementById('confirm-delete-btn').onclick = () => {
    let logs = loadLogs();
    logs = logs.filter(l => l.id !== pendingDeleteId);
    saveLogs(logs);
    closeConfirm();
    renderLogs();
    showToast('削除しました');
  };
}
function closeConfirm() {
  pendingDeleteId = null;
  document.getElementById('confirm-overlay').classList.add('hidden');
}

// ── CSV Export ──
function exportCSV() {
  const logs = loadLogs();
  if (logs.length === 0) { showToast('エクスポートするログがありません'); return; }

  const headers = ['日付','教室','出勤形態','大カテゴリ','中カテゴリ','開始時刻','終了時刻','所要時間（分）','メモ','成果物URL'];
  const rows = logs.sort((a,b) => new Date(a.startTime) - new Date(b.startTime)).map(l => {
    const s = new Date(l.startTime);
    const e = new Date(l.endTime);
    const fmt = d => `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
    return [
      l.date, l.classroom, l.shift, l.major, l.minor,
      fmt(s), fmt(e), Math.round(l.duration / 60),
      l.memo, l.artifactUrl
    ];
  });

  const csvContent = '\uFEFF' + [headers, ...rows].map(r => r.map(c => `"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `業務ログ_${new Date().toISOString().slice(0,10)}.csv`;
  link.click();
  URL.revokeObjectURL(link.href);
  showToast('CSVをダウンロードしました');
}

// ── Toast ──
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ── Init ──
state.viewDate = new Date();
</script>
